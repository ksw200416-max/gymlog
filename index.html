let _gsiLoaded = null;
function loadGsi() {
  if (_gsiLoaded) return _gsiLoaded;
  _gsiLoaded = new Promise((resolve, reject) => {
    if (window.google && window.google.accounts) return resolve();
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.async = true;
    s.defer = true;
    s.onload = resolve;
    s.onerror = () => reject(new Error("구글 라이브러리를 불러오지 못했습니다."));
    document.head.appendChild(s);
  });
  return _gsiLoaded;
}
let _accessToken = null;
async function getAccessToken() {
  if (!GOOGLE_CLIENT_ID) throw new Error("코드 상단의 GOOGLE_CLIENT_ID를 먼저 설정하세요.");
  await loadGsi();
  return new Promise((resolve, reject) => {
    const client = window.google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: (resp) => {
        if (resp && resp.access_token) {
          _accessToken = resp.access_token;
          resolve(resp.access_token);
        } else reject(new Error("구글 인증에 실패했습니다."));
      }
    });
    client.requestAccessToken({ prompt: _accessToken ? "" : "consent" });
  });
}
async function driveFindFileId(token) {
  const q = encodeURIComponent(`name='${DRIVE_FILENAME}' and trashed=false`);
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name)`,
    { headers: { Authorization: `Bearer ${token}` } }
  );
  if (!res.ok) throw new Error("드라이브 조회 실패");
  const data = await res.json();
  return data.
